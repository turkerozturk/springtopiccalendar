<body>

<h2>Günlük Kalori Takibi</h2>

<!-- Tarih seçimi -->
<form method="get" action="/food">


    <!--/* bootstrap datepicker */-->
    <div class="container mb-0" id="calorieDateContainer" style="max-width: 400px; background-color:floralwhite;">
        <div class="input-group calorieDateStyle date">
            <label for="calorieDatePicker" class="col-sm-4 col-form-label col-form-label-sm">Select Date:</label>
            <input type="text" id="calorieDatePicker"
                   class="form-control form-control-sm"/>
            <span class="input-group-append">
                    <button class="btn btn-outline-secondary" type="button">
                        <i class="far fa-calendar" aria-hidden="true"></i>
                    </button>
            </span>
            <!--
            <span class="input-group-append">
                    <button class="btn btn-outline-secondary" type="submit">
                        Getir
                    </button>
            </span>
            -->
        </div>
    </div>

</form>


<br/>

<table>
    <thead>
    <tr class="total">
        <td colspan="2">Toplam</td>
        <td th:text="${#numbers.formatDecimal(summary.totalGram,1,2)}"></td>
        <td th:text="${#numbers.formatDecimal(summary.totalKcal,1,2)}"></td>
    </tr>

    <tr>
        <!-- <th>Tarih</th> -->
        <th>100g kcal</th>
        <th>Yemek</th>
        <!-- <th>Açıklama</th> -->

        <th>Gram</th>
        <th>Kalori</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="item : ${summary.items}">

        <!-- <td th:text="${item.dateMillis}"></td> -->
        <td th:text="${#numbers.formatDecimal(item.kcalPer100g,1,2)}"></td>
        <td style="text-align: left;">
            <a th:text="${item.topicName}"
               th:href="@{/topics/edit/{id}(id=${item.topicId})}"
               target="_blank" rel="noopener noreferrer"
               title="Edit Topic">
                ✎
            </a>
        </td>
        <!-- <td th:text="${item.topicDescription}"></td> -->

        <td>

            <a      th:text="${#numbers.formatDecimal(item.gram,1,2)}"
                    th:href="@{/entries/edit/{id}(id=${item.entryId},
                                            categoryId=${item.categoryId},
                                            topicId=${item.topicId},
                                            returnPage=entries
                                            )}"
               target="_blank" rel="noopener noreferrer"
               title="Edit Entry">
                gramaj ve edit entry linki
            </a>



        </td>




        <td th:text="${#numbers.formatDecimal(item.calculatedKcal,1,2)}"></td>
    </tr>
    </tbody>

    <tfoot>
    <tr class="total">
        <td colspan="2">Toplam</td>
        <td th:text="${#numbers.formatDecimal(summary.totalGram,1,2)}"></td>
        <td th:text="${#numbers.formatDecimal(summary.totalKcal,1,2)}"></td>
    </tr>
    </tfoot>
</table>

<script type="text/javascript" th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>

<script type="text/javascript"
        th:src="@{/webjars/bootstrap/5.3.7/js/bootstrap.min.js}"></script>

<script type="text/javascript" th:src="@{/webjars/bootstrap-datepicker/dist/js/bootstrap-datepicker.js}"></script>

<script type="text/javascript" th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>

<script th:inline="javascript">
    const ZONE_ID = [[${zoneId}]];
    const DATE_MILLIS = [[${dateMillis}]];
</script>

<script>
    function convertDateToMillis(dateStr) {

        // dateStr = "2026-04-06"

        const parts = dateStr.split("-");
        const year = parseInt(parts[0]);
        const month = parseInt(parts[1]) - 1; // JS month 0-based
        const day = parseInt(parts[2]);

        // Local midnight oluştur
        const localDate = new Date(year, month, day);

        return localDate.getTime();
    }

    function loadCalorieData(dateStr) {

        const millis = convertDateToMillis(dateStr);

        const url = `/food?dateMillis=${millis}`;

        // Sayfayı redirect ederek yenile
        window.location.href = url;
    }

    function convertMillisToDateStr(millis) {

        const date = new Date(millis);

        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');

        return `${year}-${month}-${day}`;
    }

    $(function () {


        let initialDateStr;

        if (DATE_MILLIS) {
            initialDateStr = convertMillisToDateStr(DATE_MILLIS);
        } else {
            initialDateStr = new Date().toISOString().slice(0, 10);
        }

        $('#calorieDatePicker').val(initialDateStr);

        $('#calorieDateContainer .calorieDateStyle.date').datepicker({
            format: "yyyy-mm-dd",
            todayBtn: "linked",
            autoclose: true,
            todayHighlight: true
        }).on("changeDate", function (e) {
            loadCalorieData(e.format(0, "yyyy-mm-dd"));
        });

    });



</script>

</body>
</html>
